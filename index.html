<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2246727257678309"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Code Generator</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      background:white;
      width:400px;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      text-align:center;
    }

    h1{
      margin-bottom:20px;
      color:#333;
    }

    input{
      width:100%;
      padding:12px;
      border:2px solid #ddd;
      border-radius:8px;
      font-size:16px;
      margin-bottom:15px;
      outline:none;
    }

    input:focus{
      border-color:#007bff;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#007bff;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0056b3;
    }

    #qrcode{
      margin-top:25px;
      display:flex;
      justify-content:center;
    }

    .footer{
      margin-top:20px;
      color:#777;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>QR Code Generator</h1>

    <input 
      type="text" 
      id="text" 
      placeholder="Enter text or URL"
    />

    <button onclick="generateQR()">Generate QR Code</button>

    <div id="qrcode"></div>

    <div class="footer">
      Create QR codes instantly
    </div>
  </div>

  <script>
    function generateQR() {
      const qrContainer = document.getElementById("qrcode");
      const text = document.getElementById("text").value;

      qrContainer.innerHTML = "";

      if(text.trim() === ""){
        alert("Please enter text or a URL");
        return;
      }

      new QRCode(qrContainer, {
        text: text,
        width: 220,
        height: 220,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  </script>

</body>
</html>
